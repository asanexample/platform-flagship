# Namespace- and host-agnostic base (ADR-067 platform-injection). The per-Product ApplicationSet sets the
# destination namespace (platform-flagship-<stage>, Composition-created) and patches the real host onto the
# HTTPRoute. Per-stage overlays carry the image digest + any stage deltas.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - postgres.yaml

# The schema CNPG loads at DB init (ADR-099 D2). Stable name (no hash suffix) so postgres.yaml's
# postInitApplicationSQLRefs can reference it; it runs once at init, so a content hash would be noise.
configMapGenerator:
  - name: flagship-db-schema
    files:
      - db-schema.sql
generatorOptions:
  disableNameSuffixHash: true
