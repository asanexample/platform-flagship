apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagship-server
  labels:
    app: flagship-server
    app.kubernetes.io/name: flagship-server
    team: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flagship-server
  template:
    metadata:
      labels:
        app: flagship-server
        app.kubernetes.io/name: flagship-server
        team: platform
    spec:
      serviceAccountName: app-platform
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # distroless nonroot runs as the *named* user "nonroot"; the kubelet can't verify a name as
        # non-root under runAsNonRoot, so pin the known numeric UID/GID (distroless nonroot = 65532).
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flagship-server
          # Product-scoped ECR image (team-platform/flagship-server). :placeholder is the pre-first-deploy
          # seed; each overlay's ApplicationSet injects the signed digest CI promotes (ADR-071).
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-platform/flagship-server:placeholder
          ports:
            - containerPort: 8080
          # Postgres store (ADR-099 D2): DATABASE_URL is the CNPG-generated app connection string
          # (flagship-db-app Secret, `uri` key — provisioned by postgres.yaml). Absent → in-memory, which is
          # the local-dev/test path (cmd/flagship/main.go selects the store on DATABASE_URL presence).
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flagship-db-app
                  key: uri
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
