# dev (the default stage). Single replica. The image is NOT pinned here (ADR-071): the per-Product
# ApplicationSet injects the deployed digest from the control-plane Release record. CI never writes this
# repo's main; `placeholder` stays.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - allow-sync-ingress.yaml # admit alpha-shop + bravo-dispatch's flagd syncers to :8080 (east-west, ADR-099)
replicas:
  - name: flagship-server
    count: 1
images:
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-platform/flagship-server
    newTag: placeholder # the ApplicationSet injects the real digest from the Release record (ADR-071)
