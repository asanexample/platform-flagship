# Cross-namespace INGRESS: admit each tenant consumer's flagd in-process syncer to flagship-server's sync
# endpoint. The environment netpol default-denies ingress except from the gateway (allow-gateway-envoy), and
# on Cilium (BYOCNI) in-cluster pod-to-pod is IDENTITY-matched — so a consumer in another env namespace can't
# reach flagship over the Composition's 0.0.0.0/0 egress CIDR. This CNP opens the specific east-west path(s).
# Was named allow-sync-from-shop when alpha-shop was the only consumer; renamed on adding bravo-dispatch as a
# second consumer (2026-07-12) — same file, same rule, now an explicit per-namespace allow-list of two.
#
# Scoped to EXPLICIT consumer namespaces ON PURPOSE, NOT admit-all-env-namespaces-by-label: flagship serves the
# MUTATING management API (POST/PUT /api/v1/...) on the SAME port 8080 as the read-only sync GET, and its API
# authz (Keycloak RBAC) is ADR-099 D2 / Phase 2 — NOT yet implemented. Until that lands, a broad admit would
# let any tenant mutate another team's flags. Broaden to a namespace-label selector once D2 is built.
# This is a dev-overlay (stage-specific) resource — consumers are per-Environment; base stays consumer-agnostic.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-sync-ingress
spec:
  endpointSelector:
    matchLabels:
      app: flagship-server
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: alpha-shop-dev
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: bravo-dispatch-dev
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
