# CNPG Postgres for Flagship's control plane (ADR-099 D2) — the durable flag store.
#
# Runs in a dedicated PLATFORM namespace (platform-flagship-db), NOT the app's Environment namespace — a
# database is an operator-managed, API-watching, operator-polled workload that does not belong in the tenant
# sandbox (it runs cleanly here like backstage-db / keycloak-db / triage-copilot-db). Requires the
# cloudnative-pg operator on the cluster (added to preprod in platform PR #1315).
#
# Single instance for dev (flags are tiny; RPO/HA is a prod-overlay concern — instances: 3 + a scheduled
# Barman backup). CNPG generates the `flagship-db-app` Secret (connection `uri` for the app user) HERE, in the
# database namespace. Because secretKeyRef can't cross namespaces, a platform-owned Kyverno policy
# (sync-platform-db-secret) clones that Secret into the app's Environment namespace, synchronized on rotation,
# where the Deployment mounts it as DATABASE_URL (see the app's k8s/base/deployment.yaml).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: flagship-db
  namespace: platform-flagship-db
  labels:
    app.kubernetes.io/name: flagship-db
    app.kubernetes.io/part-of: flagship
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie

  # Schema loaded ONCE at database init from the flagship-db-schema ConfigMap (kustomize-generated from
  # db-schema.sql). The app does not migrate on start (internal/store/postgres.go), so this is the
  # out-of-band load it expects; future migrations are a Job, not a re-run of this.
  bootstrap:
    initdb:
      database: flagship
      owner: flagship
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: flagship-db-schema
            key: db-schema.sql

  storage:
    # Immediate binding (gp3-immediate): CNPG 1.29 stalls creating the first pod for an UNBOUND
    # WaitForFirstConsumer PVC; Immediate provisions the EBS volume on PVC creation so CNPG proceeds.
    storageClass: gp3-immediate
    size: 1Gi

  # Explicit requests+limits (the Environment namespace enforces them). A CPU request matters: rsa keygen /
  # startup on a saturated node otherwise starves (the SPIRE lesson) — CNPG's own probes gate readiness.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
